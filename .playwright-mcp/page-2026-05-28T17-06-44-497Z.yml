        - generic [ref=e12]: 0:00 / 8:48
      - article [ref=e13]:
        - paragraph [ref=e14] [cursor=pointer]: Here is a focused EA Diploma application interview preparation guide for you.
        - paragraph [ref=e15] [cursor=pointer]: "For Burnaby CCE’s Education Assistant Diploma, the key things they likely care about are: your experience with school-aged children, especially children with special needs; your communication skills; your understanding of the EA role; your ability to work under a teacher’s direction; and your readiness for Canadian school culture."
        - paragraph [ref=e16] [cursor=pointer]: Burnaby CCE states that applicants need experience working or volunteering with school-aged students in a Canadian school, including a minimum of 60 hours with children with special needs.
        - paragraph [ref=e17] [cursor=pointer]: Burnaby Community & Continuing Education Their registration page also says supporting documents include a resume, two reference letters, proof of education, and proof of English proficiency, submitted as one PDF package.
        - paragraph [ref=e18] [cursor=pointer]: Burnaby Community & Continuing Education
        - paragraph [ref=e19] [cursor=pointer]: 1. Your main interview message
        - paragraph [ref=e20] [cursor=pointer]: "You want the interviewer to remember this:"
        - paragraph [ref=e21] [cursor=pointer]: I have teaching-related experience, I understand that an EA supports students under the teacher’s guidance, I am patient and respectful, and I am ready to learn how to support students with diverse needs in Canadian classrooms.
        - paragraph [ref=e22] [cursor=pointer]: "A good 45–60 second self-introduction:"
        - paragraph [ref=e23] [cursor=pointer]: My background is in education and technology, and I have experience working with students and supporting learning.
        - paragraph [ref=e24] [cursor=pointer]: I am applying for the Education Assistant Diploma because I want to work directly with children in Canadian schools, especially students who need academic, social-emotional, behavioural, or physical support.
        - paragraph [ref=e25] [cursor=pointer]: I understand that an EA works as part of a team, follows the teacher’s and school’s plan, respects confidentiality, and helps students become more independent.
        - paragraph [ref=e26] [cursor=pointer]: I am patient, responsible, and willing to learn.
        - paragraph [ref=e27] [cursor=pointer]: I also believe my technology and communication skills can help me support students in practical ways.
        - paragraph [ref=e28] [cursor=pointer]: 2. Likely interview questions and answer ideas
        - paragraph [ref=e29] [cursor=pointer]: “Why do you want to become an Education Assistant?”
        - paragraph [ref=e30] [cursor=pointer]: "Strong answer:"
        - paragraph [ref=e31] [cursor=pointer]: I want to become an EA because I enjoy helping students grow step by step.
        - paragraph [ref=e32] [cursor=pointer]: I understand that some students need extra support to access learning, communicate, manage emotions, or participate safely in the classroom.
        - paragraph [ref=e33] [cursor=pointer]: "I like the practical, supportive role of an EA: helping students follow routines, understand instructions, stay regulated, and build confidence."
        - paragraph [ref=e34] [cursor=pointer]: I also want to contribute to inclusive education in Canadian schools.
        - paragraph [ref=e35] [cursor=pointer]: "Key words to include: inclusion, patience, independence, teamwork, student safety, dignity."
        - paragraph [ref=e36] [cursor=pointer]: "---"
        - paragraph [ref=e37] [cursor=pointer]: “What do you think an Education Assistant does?”
        - paragraph [ref=e38] [cursor=pointer]: "Strong answer:"
        - paragraph [ref=e39] [cursor=pointer]: An EA supports students under the direction of the classroom teacher and school team.
        - paragraph [ref=e40] [cursor=pointer]: The EA may help with academic tasks, communication, behaviour support, social interaction, personal care, mobility, and classroom routines.
        - paragraph [ref=e41] [cursor=pointer]: The EA should not replace the teacher, but helps students access learning and participate as independently as possible.
        - paragraph [ref=e42] [cursor=pointer]: The VSB describes EA preparation as including academic, personal care, social-emotional, physical, and behaviour support for students with special needs from Kindergarten to Grade 12.
        - paragraph [ref=e43] [cursor=pointer]: Vancouver School Board
        - paragraph [ref=e44] [cursor=pointer]: "---"
        - paragraph [ref=e45] [cursor=pointer]: “How would you support a student with challenging behaviour?”
        - paragraph [ref=e46] [cursor=pointer]: "Strong answer:"
        - paragraph [ref=e47] [cursor=pointer]: First, I would stay calm and keep the student and others safe.
        - paragraph [ref=e48] [cursor=pointer]: I would avoid escalating the situation.
        - paragraph [ref=e49] [cursor=pointer]: I would use a calm voice, give space if needed, follow the student’s support plan, and use strategies recommended by the teacher or school team.
        - paragraph [ref=e50] [cursor=pointer]: After the situation, I would report objectively what happened, not judge the student.
        - paragraph [ref=e51] [cursor=pointer]: "I would try to understand the function of the behaviour: maybe the student is overwhelmed, frustrated, tired, or unable to communicate a need."
        - paragraph [ref=e52] [cursor=pointer]: "Good phrase:"
        - paragraph [ref=e53] [cursor=pointer]: Behaviour is communication.
        - paragraph [ref=e54] [cursor=pointer]: "---"
        - paragraph [ref=e55] [cursor=pointer]: “How would you work with a classroom teacher?”
        - paragraph [ref=e56] [cursor=pointer]: "Strong answer:"
        - paragraph [ref=e57] [cursor=pointer]: I would communicate respectfully and follow the teacher’s direction.
        - paragraph [ref=e58] [cursor=pointer]: I would ask questions when I am unsure, give brief factual updates about the student, and support the classroom routines.
        - paragraph [ref=e59] [cursor=pointer]: I understand that the teacher is responsible for instruction and planning, while the EA helps implement support strategies.
        - paragraph [ref=e60] [cursor=pointer]: I would also respect professional boundaries and confidentiality.
        - paragraph [ref=e61] [cursor=pointer]: "---"
        - paragraph [ref=e62] [cursor=pointer]: “How would you handle confidential information?”
        - paragraph [ref=e63] [cursor=pointer]: "Strong answer:"
        - paragraph [ref=e64] [cursor=pointer]: I would not discuss a student’s diagnosis, family situation, behaviour, or learning needs with people who are not part of the school team.
        - paragraph [ref=e65] [cursor=pointer]: I would only share information with appropriate staff when it is necessary for student support or safety.
        - paragraph [ref=e66] [cursor=pointer]: I understand that confidentiality is part of professional responsibility.
        - paragraph [ref=e67] [cursor=pointer]: "---"
        - paragraph [ref=e68] [cursor=pointer]: “What are your strengths?”
        - paragraph [ref=e69] [cursor=pointer]: "Choose 2–3 only:"
        - paragraph [ref=e70] [cursor=pointer]: My strengths are patience, responsibility, and problem-solving.
        - paragraph [ref=e71] [cursor=pointer]: I can stay calm when a student is frustrated.
        - paragraph [ref=e72] [cursor=pointer]: I am reliable and take instructions seriously.
        - paragraph [ref=e73] [cursor=pointer]: I also have technology skills, so I can learn educational tools or assistive technology quickly if the school uses them.
        - paragraph [ref=e74] [cursor=pointer]: "---"
        - paragraph [ref=e75] [cursor=pointer]: “What is one area you need to improve?”
        - paragraph [ref=e76] [cursor=pointer]: "Use a safe weakness:"
        - paragraph [ref=e77] [cursor=pointer]: I am still learning the Canadian school system and the exact role boundaries of an EA.
        - paragraph [ref=e78] [cursor=pointer]: That is one reason I want to take this diploma program.
        - paragraph [ref=e79] [cursor=pointer]: I am open to feedback and I want to learn the correct professional practices.
        - paragraph [ref=e80] [cursor=pointer]: This is better than saying “my English is weak.” You can say you are improving communication, but frame it positively.
        - paragraph [ref=e81] [cursor=pointer]: "---"
        - paragraph [ref=e82] [cursor=pointer]: “Tell us about your experience with children.”
        - paragraph [ref=e83] [cursor=pointer]: "Use the STAR format:"
        - paragraph [ref=e84] [cursor=pointer]: "Situation: where you worked/volunteered"
        - paragraph [ref=e85] [cursor=pointer]: "Task: what you needed to support"
        - paragraph [ref=e86] [cursor=pointer]: "Action: what you did"
        - paragraph [ref=e87] [cursor=pointer]: "Result: what improved"
        - paragraph [ref=e88] [cursor=pointer]: "Example:"
        - paragraph [ref=e89] [cursor=pointer]: In my previous experience, I supported students who needed help understanding instructions and staying focused.
        - paragraph [ref=e90] [cursor=pointer]: I broke tasks into smaller steps, checked understanding, and encouraged the student when they completed each part.
        - paragraph [ref=e91] [cursor=pointer]: I learned that students respond better when support is calm, clear, and respectful.
        - paragraph [ref=e92] [cursor=pointer]: If they ask about special needs experience, be honest.
        - paragraph [ref=e93] [cursor=pointer]: Do not exaggerate.
        - paragraph [ref=e94] [cursor=pointer]: 3. Questions you can ask them
        - paragraph [ref=e95] [cursor=pointer]: "At the end, ask one or two:"
        - paragraph [ref=e96] [cursor=pointer]: What qualities do successful students in this EA Diploma program usually have?
        - paragraph [ref=e97] [cursor=pointer]: How does the program prepare students for practicum in Canadian schools?
        - paragraph [ref=e98] [cursor=pointer]: What should I review or prepare before the program begins?
        - paragraph [ref=e99] [cursor=pointer]: These questions show maturity and readiness.
        - paragraph [ref=e100] [cursor=pointer]: 4. Things to avoid saying
        - paragraph [ref=e101] [cursor=pointer]: "Avoid:"
        - paragraph [ref=e102] [cursor=pointer]: I want to be an EA because it is easier than being a teacher.
        - paragraph [ref=e103] [cursor=pointer]: I can discipline students.
        - paragraph [ref=e104] [cursor=pointer]: I will teach the class.
        - paragraph [ref=e105] [cursor=pointer]: I know exactly how to handle special needs students.
        - paragraph [ref=e106] [cursor=pointer]: "Better:"
        - paragraph [ref=e107] [cursor=pointer]: I will follow the teacher’s direction and the student support plan.
        - paragraph [ref=e108] [cursor=pointer]: I want to learn professional strategies.
        - paragraph [ref=e109] [cursor=pointer]: I believe every student deserves respect and support.
        - paragraph [ref=e110] [cursor=pointer]: 5. Short practice script
        - paragraph [ref=e111] [cursor=pointer]: "You can practice this:"
        - paragraph [ref=e112] [cursor=pointer]: I am applying for the EA Diploma because I want to support students in Canadian schools, especially students who need extra help to participate and learn.
        - paragraph [ref=e113] [cursor=pointer]: I understand that an EA works under the direction of teachers and school teams.
        - paragraph [ref=e114] [cursor=pointer]: The role requires patience, respect, confidentiality, and good communication.
        - paragraph [ref=e115] [cursor=pointer]: My background gives me experience with learning support and problem-solving, and I am ready to learn more about inclusive education, behaviour support, and professional practice in schools.
        - paragraph [ref=e116] [cursor=pointer]: My goal is to become a reliable EA who helps students build confidence and independence.
        - paragraph [ref=e117] [cursor=pointer]: 6. Your best positioning
        - paragraph [ref=e118] [cursor=pointer]: "For you, I would emphasize:"
        - paragraph [ref=e119] [cursor=pointer]: You have education-related experience.
        - paragraph [ref=e120] [cursor=pointer]: You understand learning support.
        - paragraph [ref=e121] [cursor=pointer]: You have strong technology skills.
        - paragraph [ref=e122] [cursor=pointer]: You are mature and responsible.
        - paragraph [ref=e123] [cursor=pointer]: You are new to the Canadian EA system, but very willing to learn.
        - paragraph [ref=e124] [cursor=pointer]: You want to support inclusion, not just “help students finish homework.”
        - paragraph [ref=e125] [cursor=pointer]: "A strong closing answer:"
        - paragraph [ref=e126] [cursor=pointer]: I know I still need formal training in the Canadian school system, which is why I am applying for this program.
        - paragraph [ref=e127] [cursor=pointer]: I am serious about learning the professional role of an EA, and I believe my patience, responsibility, and learning background will help me succeed.
