        - paragraph [ref=e994] [cursor=pointer]: Although little is known about how the Ik got to their present situation, there are some indications of former organizational patterns.
        - paragraph [ref=e995] [cursor=pointer]: They possess clan names, although today these have no structural significance.
        - paragraph [ref=e996] [cursor=pointer]: They live in villages, but these no longer have any political meaning.
        - paragraph [ref=e997] [cursor=pointer]: The traditional authority structure of family, lineage, and clan leaders has been progressively weakened.
        - paragraph [ref=e998] [cursor=pointer]: It appears that a former level of organization has simply been abandoned by the Ik as unprofitable and unsuitable in their present distress (Turnbull 1978).
        - paragraph [ref=e999] [cursor=pointer]: Remarks
        - paragraph [ref=e1000] [cursor=pointer]: Other cases that could be added to this list are the collapses of modern empires (such as the Spanish, French, and British).
        - paragraph [ref=e1001] [cursor=pointer]: The demise of these empires clearly represents a retrenchment from a multi-national level of centralized organization that was global in extent.
        - paragraph [ref=e1002] [cursor=pointer]: There are, however, differences from the majority of cases just discussed.
        - paragraph [ref=e1003] [cursor=pointer]: Most notable is the fact that the loss of empire did not correspondingly entail collapse of the home administration.
        - paragraph [ref=e1004] [cursor=pointer]: In this the modern cases appear like the Old Babylonian kingdom, where a short-lived empire was followed by a period of retrenchment, with no end to Babylon itself.
        - paragraph [ref=e1005] [cursor=pointer]: There are qualitative differences between ancient societies and modern ones in their susceptibility to collapse (although not for the reasons usually thought).
        - paragraph [ref=e1006] [cursor=pointer]: This point will be addressed in the final chapter.
        - paragraph [ref=e1007] [cursor=pointer]: After collapse
        - paragraph [ref=e1008] [cursor=pointer]: Popular writers and film producers have developed a consistent image of what life will be like after the collapse of industrial society.
        - paragraph [ref=e1009] [cursor=pointer]: With some variation, the picture that emerges is of a Hobbesian war-of-all-against-all, Ik-conditions extended globally.
        - paragraph [ref=e1010] [cursor=pointer]: Only the strong survive; the weak are victimized, robbed, and killed.
        - paragraph [ref=e1011] [cursor=pointer]: There is fighting for food and fuel.
        - paragraph [ref=e1012] [cursor=pointer]: Whatever central authority remains lacks the resources to reimpose order.
        - paragraph [ref=e1013] [cursor=pointer]: Bands of pitiful, maimed survivors scavenge among the ruins of grandeur.
        - paragraph [ref=e1014] [cursor=pointer]: Grass grows in the streets.
        - paragraph [ref=e1015] [cursor=pointer]: There is no higher goal than survival.
        - paragraph [ref=e1016] [cursor=pointer]: Anyone who has read modern disaster literature, or seen it dramatized, will recognize this script.
        - paragraph [ref=e1017] [cursor=pointer]: It has contributed substantially to current apprehensions about collapse.
        - paragraph [ref=e1018] [cursor=pointer]: Such a scenario, although clearly overdramatized, does contain many elements that are verifiable in past collapses.
