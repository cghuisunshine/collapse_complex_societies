        - paragraph [ref=e371] [cursor=pointer]: ACKNOWLEDGEMENTS
        - paragraph [ref=e372] [cursor=pointer]: "Edward Hallett Carr once suggested that Toynbee's cyclical theory of history was the characteristic view of a society in crisis (1961: 37), and others have noted that there is often a concern with collapse at times of distress."
        - paragraph [ref=e373] [cursor=pointer]: While doubtlessly this is true, the present work reflects an interest that has lain unfulfilled since my first exposure to this topic.
        - paragraph [ref=e374] [cursor=pointer]: Its fruition owes much to two persons.
        - paragraph [ref=e375] [cursor=pointer]: Foremost is my wife, Bonnie Bagley Tainter, who encouraged me to transform my interest in collapse, and my dissatisfaction with the state of its study, into this book.
        - paragraph [ref=e376] [cursor=pointer]: Where I had in mind perhaps a few papers, she saw that only a longer treatment would suffice, and the work owes a great deal to her foresight.
        - paragraph [ref=e377] [cursor=pointer]: It was in the course of many conversations with Bonnie that the ideas presented here reached their final form.
        - paragraph [ref=e378] [cursor=pointer]: Both she and our son, Emmet, tolerated the disruption that such a work entails, for the nearly two years needed for research and writing, without wavering in their support.
        - paragraph [ref=e379] [cursor=pointer]: Finally, Bonnie's sharp editorial eye helped smooth the first draft into a more readable document.
        - paragraph [ref=e380] [cursor=pointer]: Thomas King has for several years been dissatisfied with the archaeological research done in the United States under the mandate of historic preservation.
        - paragraph [ref=e381] [cursor=pointer]: To formulate a program of improvement, he organized a symposium for the 1982 Annual Meeting of the Society for American Archaeology on the subject of 'National Archaeological Research Topics,' and invited me to make a presentation.
        - paragraph [ref=e382] [cursor=pointer]: The short paper that resulted was my first attempt to articulate what previously had been vague misgivings about the study of collapse.
        - paragraph [ref=e383] [cursor=pointer]: What is presented in these pages is an outgrowth of that paper, and of Tom's encouragement to undertake it.
        - paragraph [ref=e384] [cursor=pointer]: A number of colleagues with whom I corresponded expressed interest in the work, and responded readily to my requests for references and papers.
        - paragraph [ref=e385] [cursor=pointer]: These were George Cowgill, T.
        - paragraph [ref=e386] [cursor=pointer]: Patrick Culbert, Michael Parker-Pearson, John Pfeiffer, Robert Sharer, Stephen Whittington, Robert Wenke, and most especially, Norman Yoffee.
        - paragraph [ref=e387] [cursor=pointer]: Emily Garber and Carol Raish gave generously of time and effort to help obtain bibliographic materials.
        - paragraph [ref=e388] [cursor=pointer]: I am grateful to Larry Nordby of the U.
        - paragraph [ref=e389] [cursor=pointer]: S.
        - paragraph [ref=e390] [cursor=pointer]: National Park Service, and to various authors and publishers as noted in the text, who gave permission to reproduce illustrations.
        - paragraph [ref=e391] [cursor=pointer]: Sherry Holtke capably prepared Fig.
