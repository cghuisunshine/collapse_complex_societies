        - paragraph [ref=e847] [cursor=pointer]: In northern Mexico, far north of Mesoamerica and a few kilometers south of the present U.S./Mexico border, a major center was built which displays both Mesoamerican and Southwestern trappings of centralized political integration.
        - paragraph [ref=e848] [cursor=pointer]: Beginning about 1060 A.D., there was a major construction program at the regionally unique center of Casas Grandes.
