        - paragraph [ref=e866] [cursor=pointer]: The Chacoans
        - paragraph [ref=e867] [cursor=pointer]: The San Juan Basin is an arid, upland plateau located in northwestern New Mexico.
        - paragraph [ref=e868] [cursor=pointer]: Across this inhospitable landscape are found the remains of once-populous towns and villages, now utterly ruined and filled with windblown sand.
        - paragraph [ref=e869] [cursor=pointer]: The Chacoan towns, while not as widely known as the Mayan cities, present a similarly compelling picture.
        - paragraph [ref=e870] [cursor=pointer]: Instead of cities overtaken by jungle, the Chacoan image is of lost towns filled with drifting sands, and frequented only by desert fauna or occasional Navajo herders.
        - paragraph [ref=e871] [cursor=pointer]: The Chacoans were clearly masters of this desert, but somehow, disturbingly, they lost their mastery and the desert prevailed.
        - paragraph [ref=e872] [cursor=pointer]: The Chacoans built a series of walled stone towns, called pueblos, across the San Juan Basin, and connected many of them by roads - roads that traverse the desert, ascend mesas, and cross ravines.
        - paragraph [ref=e873] [cursor=pointer]: Exotic goods were imported from as far away as northern Mexico and the Pacific Ocean.
        - paragraph [ref=e874] [cursor=pointer]: Trees to roof the towns were carried up to 50 kilometers across the desert to Chaco Canyon, the center of the Basin.
        - paragraph [ref=e875] [cursor=pointer]: From as early as 500 A.D.
        - paragraph [ref=e876] [cursor=pointer]: this regional society thrived.
        - paragraph [ref=e877] [cursor=pointer]: Sometime after 1050 A.D., however, something went wrong.
        - paragraph [ref=e878] [cursor=pointer]: Construction at towns ended, and some, then many, began to be abandoned.
        - paragraph [ref=e879] [cursor=pointer]: Trade networks declined, and the towns were scavenged for building materials.
        - paragraph [ref=e880] [cursor=pointer]: By 1300 A.D.
        - paragraph [ref=e881] [cursor=pointer]: the last sedentary peoples had either left, or reverted to a simple, mobile lifestyle.
        - paragraph [ref=e882] [cursor=pointer]: The Chacoans were not alone among prehistoric Southwesterners in this experience.
        - paragraph [ref=e883] [cursor=pointer]: Peoples such as the Mimbres, the Jornada, and many others lived through their own episodes of collapse and abandonment of settled areas (Powers et al.
        - paragraph [ref=e884] [cursor=pointer]: 1983; Schelberg 1982; Tainter and Gillio 1980; Jelinek 1967; Stuart and Gauthier 1981; Upham 1984; Minnis 1985; Kelley 1952; Reed 1944).
        - paragraph [ref=e885] [cursor=pointer]: The Hohokam
        - paragraph [ref=e886] [cursor=pointer]: The Hohokam were dwellers of the southern Arizona desert, who before their collapse in the fifteenth century A.D.
        - paragraph [ref=e887] [cursor=pointer]: developed a complex cultural system characterized by extensive canal irrigation, public architecture, and an elaborate artifactual repertoire.
        - paragraph [ref=e888] [cursor=pointer]: The Hohokam canal systems from the Salt and Gila rivers were large and sophisticated.
        - paragraph [ref=e889] [cursor=pointer]: Modern canals around the city of Phoenix parallel this ancient pattern.
        - paragraph [ref=e890] [cursor=pointer]: The population supported by this system invested in the construction of Mesoamerican-like symbols of political integration, such as ball courts and platform mounds.
        - paragraph [ref=e891] [cursor=pointer]: After ca.
        - paragraph [ref=e892] [cursor=pointer]: 1300 A.D.
        - paragraph [ref=e893] [cursor=pointer]: the Hohokam began to develop a new form of architecture, characterized by 'Great Houses' of above-ground, multi-storied, poured adobe.
        - paragraph [ref=e894] [cursor=pointer]: The Great House at Casa Grande was situated within a 26 hectare walled compound that included many residential structures.
        - paragraph [ref=e895] [cursor=pointer]: The site of Los Muertos extended over several square kilometers.
        - paragraph [ref=e896] [cursor=pointer]: The contemporary Pima of southern Arizona appear to be the lineal descendants of the Hohokam, but at the time of European contact lacked the political centralization that was characteristic of their ancestors (Haury 1976; Doyel 1981; McGuire 1982; Martin and Plog 1973).
        - paragraph [ref=e897] [cursor=pointer]: The Eastern Woodlands
        - paragraph [ref=e898] [cursor=pointer]: "There were at least two cases of region-wide sociopolitical collapse in the prehistory of the North American Eastern Woodlands: those of the Hopewell and Mississippian complexes."
        - paragraph [ref=e899] [cursor=pointer]: The Hopewell complex developed in the last one or two centuries B.C.
        - paragraph [ref=e900] [cursor=pointer]: and the first four centuries A.D.
        - paragraph [ref=e901] [cursor=pointer]: in the Great Lakes-Riverine area of the Midwest.
        - paragraph [ref=e902] [cursor=pointer]: Hopewell is distinguished by such features as construction of large earthworks requiring mobilization and coordination of labor, complex systems of mortuary ritual, elaborate artifact forms, and importation of exotic raw materials and goods from across the eastern two-thirds of what is now the United States.
        - paragraph [ref=e903] [cursor=pointer]: Archaeological analysis reveals that Hopewell in many areas was characterized by complex, hierarchically organized societies in which segments of the economic system were controlled by elites of hereditary status.
        - paragraph [ref=e904] [cursor=pointer]: By perhaps 400 A.D., however, the regional constellation of localized Hopewellian societies had everywhere collapsed.
        - paragraph [ref=e905] [cursor=pointer]: The succeeding Late Woodland period (ca.
        - paragraph [ref=e906] [cursor=pointer]: 400-900 A.D.)
        - paragraph [ref=e907] [cursor=pointer]: is marked by a curtailment in trade, mortuary ceremonialism, public construction, and social complexity.
        - paragraph [ref=e908] [cursor=pointer]: This hiatus was terminated by the Mississippian complex, with trade, ceremonialism, public architecture, and political centralization that exceeded by far the levels of Hopewell.
        - paragraph [ref=e909] [cursor=pointer]: The most complex, and best known, Mississippian polity was centered at Cahokia.
        - paragraph [ref=e910] [cursor=pointer]: Located at a confluence of major river systems in what is now East St Louis, Cahokia is the largest archaeological site north of Mesoamerica.
        - paragraph [ref=e911] [cursor=pointer]: Cahokia contained some 120 mounds spread across 8 square kilometers, and with its outlying settlements had a population of perhaps 40,000 persons.
        - paragraph [ref=e912] [cursor=pointer]: It contains Monks Mound, a 6 hectare, 600,000 cubic meter, 30 meter high earthwork that is the third largest pyramid in the Americas and one of the largest features ever built by prehistoric peoples.
        - paragraph [ref=e913] [cursor=pointer]: A timber stockade was built around the central part of Cahokia, including Monks Mound.
        - paragraph [ref=e914] [cursor=pointer]: Several circular astronomical observatories were built, considered by some to be wooden versions of England's famous Stonehenge (and misappropriately labeled 'woodhenges').
        - paragraph [ref=e915] [cursor=pointer]: There is a planned pattern to Cahokia.
        - paragraph [ref=e916] [cursor=pointer]: It was built by a stratified society in which there was centralized control of resources.
        - paragraph [ref=e917] [cursor=pointer]: At least one member of the community elite was buried with human retainers and an array of imported luxury goods.
        - paragraph [ref=e918] [cursor=pointer]: After 1250 A.D.
        - paragraph [ref=e919] [cursor=pointer]: activity at Cahokia declined, some areas were converted from public to private use, and over time this center lost its regional supremacy.
        - paragraph [ref=e920] [cursor=pointer]: Some Mississippian-like societies persisted in the southeastern U.S.
