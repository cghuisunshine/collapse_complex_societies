        - paragraph [ref=e402] [cursor=pointer]: Introduction to collapse
        - paragraph [ref=e403] [cursor=pointer]: Much of the central floodplain of the ancient Euphrates now lies beyond the frontiers of cultivation, a region of empty desolation.
        - paragraph [ref=e404] [cursor=pointer]: Tangled dunes, long disused canal levees, and the rubble-strewn mounds of former settlement contribute only low, featureless relief.
        - paragraph [ref=e405] [cursor=pointer]: Vegetation is sparse, and in many areas it is almost wholly absent.
        - paragraph [ref=e406] [cursor=pointer]: Rough, wind-eroded land surfaces and periodically flooded depressions form an irregular patchwork in all directions, discouraging any but the most committed traveler.
        - paragraph [ref=e407] [cursor=pointer]: To suggest the immediate impact of human life there is only a rare tent...
        - paragraph [ref=e408] [cursor=pointer]: Yet at one time here lay the core, the heartland, the oldest urban, literate civilization in the world.
        - paragraph [ref=e409] [cursor=pointer]: Robert McC. Adams
        - paragraph [ref=e410] [cursor=pointer]: "(1981: xvii)"
        - paragraph [ref=e411] [cursor=pointer]: We ascended by large stone steps, in some places perfect, and in others thrown down by trees which had grown up between the crevices...
        - paragraph [ref=e412] [cursor=pointer]: we followed our guide...
        - paragraph [ref=e413] [cursor=pointer]: through the thick forest, among half-buried fragments, to fourteen monuments...
        - paragraph [ref=e414] [cursor=pointer]: one displaced from its pedestal by enormous roots; another locked in the close embrace of branches of trees, and almost lifted out of the earth; another hurled to the ground, and bound down by huge vines and creepers; and one standing, with its altar before it, in a grove of trees which grew around it, seeming to shade and shroud it as a sacred thing...
        - paragraph [ref=e415] [cursor=pointer]: The only sounds that disturbed the quiet of this buried city were the noise of monkeys...
        - paragraph [ref=e416] [cursor=pointer]: John L. Stephens
        - paragraph [ref=e417] [cursor=pointer]: "(1850: 102-3)"
        - paragraph [ref=e418] [cursor=pointer]: "The image of lost civilizations is compelling: cities buried by drifting sands or tangled jungle, ruin and desolation where once there were people and abundance."
        - paragraph [ref=e419] [cursor=pointer]: Surely few persons can read such descriptions and not sense awe and mystery.
        - paragraph [ref=e420] [cursor=pointer]: Invariably we are spellbound, and want to know more.
        - paragraph [ref=e421] [cursor=pointer]: Who were these people and, particularly, what happened to them?
        - paragraph [ref=e422] [cursor=pointer]: How could flourishing civilizations have existed in what are now such devastated circumstances?
        - paragraph [ref=e423] [cursor=pointer]: Did the people degrade their environment, did the climate change, or did civil conflict lead to collapse?
        - paragraph [ref=e424] [cursor=pointer]: Did foreign invaders put these cities to an end?
        - paragraph [ref=e425] [cursor=pointer]: Or is there some mysterious, internal dynamic to the rise and fall of civilizations?
        - paragraph [ref=e426] [cursor=pointer]: Some of us are so fascinated by these questions that we devote our lives to studying them.
        - paragraph [ref=e427] [cursor=pointer]: Most people encounter the dilemma of fallen empires and devastated cities in casual reading, or in a school course.
        - paragraph [ref=e428] [cursor=pointer]: The image is troublesome to all, not only for the vast human endeavors that have mysteriously failed, but also for the enduring implication of these failures.
        - paragraph [ref=e429] [cursor=pointer]: "The implication is clear: civilizations are fragile, impermanent things."
        - paragraph [ref=e430] [cursor=pointer]: This fact inevitably captures our attention, and however we might wish otherwise, prompts disturbing questions.
        - paragraph [ref=e431] [cursor=pointer]: Are modern societies similarly vulnerable?
        - paragraph [ref=e432] [cursor=pointer]: "Is it likely, as Ortega asserts, that 'The possibility that a civilization should die doubles our own mortality' (quoted in Mazzarino [1966: 171])?"
        - paragraph [ref=e433] [cursor=pointer]: Many of course prefer to believe that modern civilization, with its scientific and technological capacity, its energy resources, and its knowledge of economics and history, should be able to survive whatever crises ancient and simpler societies found insurmountable.
        - paragraph [ref=e434] [cursor=pointer]: But how firm is this belief?
        - paragraph [ref=e435] [cursor=pointer]: "Many persons who have some awareness of history no doubt harbor the suspicion, as Wilamowitz voiced regarding the Roman Empire, that 'Civilization can die, because it has already died once' (quoted in Mazzarino [1966: 174])."
        - paragraph [ref=e436] [cursor=pointer]: "To some historians of the early twentieth century the twilight of Rome seemed almost a page of contemporary history (Mazzarino 1966: 173; Casson 1937: 183)."
        - paragraph [ref=e437] [cursor=pointer]: This analogy has become deeply rooted in popular thought, and certainly persists today.
        - paragraph [ref=e438] [cursor=pointer]: It is even reflected in the writings of some modern competent authorities (e.g., Isaac 1971).
        - paragraph [ref=e439] [cursor=pointer]: The irresistible allusion to ancient Rome has dominated the thinking of large numbers of people for one and one-half millennia (Mazzarino 1966).
        - paragraph [ref=e440] [cursor=pointer]: Were it not for this well-documented example of a powerful empire disintegrating, to which every Western schoolchild is exposed, the fear of collapse would certainly be less widespread.
        - paragraph [ref=e441] [cursor=pointer]: As it is, those who are concerned about the future of industrial society, about its economic direction, its ecological basis, and its political superstructure, have an irrefutable illustration of the contention that civilizations, even powerful ones, are vulnerable.
        - paragraph [ref=e442] [cursor=pointer]: Why study collapse?
        - paragraph [ref=e443] [cursor=pointer]: "Many social scientists might agree with Isaac: 'It goes without saying that the collapse of ancient civilization is the most outstanding event in its history...'"
        - paragraph [ref=e444] [cursor=pointer]: "(1971: xi)."
        - paragraph [ref=e445] [cursor=pointer]: "Yet beyond scientific interest there is an additional reason: collapse is a topic of the most widespread concern and the highest social significance."
        - paragraph [ref=e446] [cursor=pointer]: The reason why complex societies disintegrate is of vital importance to every member of one, and today that includes nearly the entire world population.
        - paragraph [ref=e447] [cursor=pointer]: Whether or not collapse was the most outstanding event of ancient history, few would care for it to become the most significant event of the present era.
        - paragraph [ref=e448] [cursor=pointer]: Even if one believes that modern societies are less vulnerable to collapse than ancient ones, the possibility that they may not be so remains troubling.
        - paragraph [ref=e449] [cursor=pointer]: In the absence of a systematic, scientific treatment of collapse such concerns range untethered to any firm, reliable base.
        - paragraph [ref=e450] [cursor=pointer]: Disintegration of the social order has been a recurrent concern in Western history, and has often been expressed in a religious idiom.
        - paragraph [ref=e451] [cursor=pointer]: In the last few decades this concern has seemingly become rampant, and has achieved expression through a more secular form.
        - paragraph [ref=e452] [cursor=pointer]: "A review of a recent exhibit of Mayan artifacts expressed popular thinking well:"
        - paragraph [ref=e453] [cursor=pointer]: ...some of the fascination of the Maya.
        - paragraph [ref=e454] [cursor=pointer]: ..may lie in the legendary 'collapse' of their culture several centuries before the Spanish conquest.
        - paragraph [ref=e455] [cursor=pointer]: Every thoughtful person who ponders the bureaucratic and technological pressures on ordinary life today must wonder whether it is possible for a society to strangle on its own complexities...
        - paragraph [ref=e456] [cursor=pointer]: Sensing that our own collective future is in jeopardy..
        - paragraph [ref=e457] [cursor=pointer]: ".we are hungry for historical analysis to help us imagine the direction events might take (Baker 1986: 12)."
        - paragraph [ref=e458] [cursor=pointer]: This concern crosses the social and intellectual spectrum, from the responsible scientists and business leaders who make up the Club of Rome, to the more extreme fringes of the 'survivalist' movement.
        - paragraph [ref=e459] [cursor=pointer]: "In between one finds a variety of serious, well-meaning persons: environmentalists, no-growth advocates, nuclear-freeze proponents, and others."
        - paragraph [ref=e460] [cursor=pointer]: All fear, for one reason or another, that industrial civilization is in danger.
        - paragraph [ref=e461] [cursor=pointer]: Such fears are frequently based on historical analogy with past civilizations that have disappeared (and indeed it is sometimes suggested that we are about to go the way of the dinosaurs).
        - paragraph [ref=e462] [cursor=pointer]: Contemporary thinkers foresee collapse from such catastrophes as nuclear war, resource depletion, economic decline, ecological crises, or sociopolitical disintegration (e.g., Meadows et al.
        - paragraph [ref=e463] [cursor=pointer]: 1972; Catton 1980; Turco et al.
        - paragraph [ref=e464] [cursor=pointer]: 1984).
        - paragraph [ref=e465] [cursor=pointer]: Only recently have such fears become widespread.
        - paragraph [ref=e466] [cursor=pointer]: "As Dawson has noted:"
        - paragraph [ref=e467] [cursor=pointer]: "Of all the changes that the twentieth century has brought, none goes deeper than the disappearance of that unquestioning faith in the future and the absolute value of our civilization which was the dominant note of the nineteenth century (1956: 54)."
        - paragraph [ref=e468] [cursor=pointer]: Although collapse has been of interest for as long as societies have proven vulnerable, it has been a difficult mystery for historians and social scientists.
        - paragraph [ref=e469] [cursor=pointer]: Perhaps because of this, the development of political complexity has attracted more scholarly attention than collapse, its antithesis.
        - paragraph [ref=e470] [cursor=pointer]: Human history as a whole has been characterized by a seemingly inexorable trend toward higher levels of complexity, specialization, and sociopolitical control, processing of greater quantities of energy and information, formation of ever larger settlements, and development of more complex and capable technologies.
        - paragraph [ref=e471] [cursor=pointer]: This persistent aspect of our history has rightfully received an overwhelming amount of research, so that today we are beginning to understand how this came about.
        - paragraph [ref=e472] [cursor=pointer]: Yet the instances when this almost universal trend has been disrupted by collapse have not received a corresponding level of attention.
        - paragraph [ref=e473] [cursor=pointer]: To be sure, innumerable writers have produced myriad explanations of collapse; but even so, understanding disintegration has remained a distinctly minor concern in the social sciences.
        - paragraph [ref=e474] [cursor=pointer]: Explanations of collapse have tended to be ad hoc, pertaining only to one or a few societies, so that a general understanding remains elusive.
        - paragraph [ref=e475] [cursor=pointer]: At the same time, as will be shown, such theories have suffered in common from a number of conceptual and logical failings.
        - paragraph [ref=e476] [cursor=pointer]: When this study was begun there was no reliable, universal explanation of collapse, no theory that would help us to understand most or all of its occurrences.
        - paragraph [ref=e477] [cursor=pointer]: It was indeed this state of affairs that prompted the present undertaking.
        - paragraph [ref=e478] [cursor=pointer]: The objective of this work then is to develop a general explanation of collapse, applicable in a variety of contexts, and with implications for current conditions.
        - paragraph [ref=e479] [cursor=pointer]: This is a work of archaeology and history, but more basically of social theory.
        - paragraph [ref=e480] [cursor=pointer]: The approach is to first introduce and exemplify collapse, and then in Chapter 2 to briefly examine the nature of complex societies.
        - paragraph [ref=e481] [cursor=pointer]: Chapter 3 discusses and evaluates existing approaches to understanding collapse.
        - paragraph [ref=e482] [cursor=pointer]: A general explanation is developed in Chapter 4, and evaluated by case studies in Chapter 5.
        - paragraph [ref=e483] [cursor=pointer]: A concluding chapter further discusses the proposed explanation, synthesizes the work, and raises some implications for the contemporary scene.
        - paragraph [ref=e484] [cursor=pointer]: What is collapse?
        - paragraph [ref=e485] [cursor=pointer]: "`Collapse' is a broad term that can cover many kinds of processes."
        - paragraph [ref=e486] [cursor=pointer]: It means different things to different people.
        - paragraph [ref=e487] [cursor=pointer]: Some see collapse as a thing that could happen only to societies organized at the most complex level.
        - paragraph [ref=e488] [cursor=pointer]: To them, the notion of tribal societies or village horticulturalists collapsing will seem odd.
        - paragraph [ref=e489] [cursor=pointer]: Others view collapse in terms of economic disintegration, of which the predicted end of industrial society is the ultimate expression.
        - paragraph [ref=e490] [cursor=pointer]: Still others question the very utility of the concept, pointing out that art styles and literary traditions often survive political decentralization.
        - paragraph [ref=e491] [cursor=pointer]: Collapse, as viewed in the present work, is a political process.
        - paragraph [ref=e492] [cursor=pointer]: It may, and often does, have consequences in such areas as economics, art, and literature, but it is fundamentally a matter of the sociopolitical sphere.
        - paragraph [ref=e493] [cursor=pointer]: A society has collapsed when it displays a rapid, significant loss of an established level of sociopolitical complexity.
        - paragraph [ref=e494] [cursor=pointer]: The term 'established level' is important.
        - paragraph [ref=e495] [cursor=pointer]: To qualify as an instance of collapse a society must have been at, or developing toward, a level of complexity for more than one or two generations.
        - paragraph [ref=e496] [cursor=pointer]: The demise of the Carolingian Empire, thus, is not a case of collapse - merely an unsuccessful attempt at empire building.
        - paragraph [ref=e497] [cursor=pointer]: The collapse, in turn, must be rapid - taking no more than a few decades - and must entail a substantial loss of sociopolitical structure.
        - paragraph [ref=e498] [cursor=pointer]: Losses that are less severe, or take longer to occur, are to be considered cases of weakness and decline.
        - paragraph [ref=e499] [cursor=pointer]: "Collapse is manifest in such things as:"
        - paragraph [ref=e500] [cursor=pointer]: a lower degree of stratification and social differentiation;
        - paragraph [ref=e501] [cursor=pointer]: less economic and occupational specialization, of individuals, groups, and territories;
        - paragraph [ref=e502] [cursor=pointer]: less centralized control; that is, less regulation and integration of diverse economic and political groups by elites;
        - paragraph [ref=e503] [cursor=pointer]: less behavioral control and regimentation;
        - paragraph [ref=e504] [cursor=pointer]: "less investment in the epiphenomena of complexity, those elements that define the concept of 'civilization': monumental architecture, artistic and literary achievements, and the like;"
        - paragraph [ref=e505] [cursor=pointer]: less flow of information between individuals, between political and economic groups, and between a center and its periphery;
        - paragraph [ref=e506] [cursor=pointer]: less sharing, trading, and redistribution of resources;
        - paragraph [ref=e507] [cursor=pointer]: less overall coordination and organization of individuals and groups;
        - paragraph [ref=e508] [cursor=pointer]: a smaller territory integrated within a single political unit.
        - paragraph [ref=e509] [cursor=pointer]: Not all collapsing societies, to be sure, will be equally characterized by each item on this list, and the list is by no means complete.
        - paragraph [ref=e510] [cursor=pointer]: Some societies that come under this definition have not possessed all of these features, and indeed one or two that will be introduced had few of them.
        - paragraph [ref=e511] [cursor=pointer]: This list, however, provides a fairly concise description of what happened in most of the better known cases of collapse.
        - paragraph [ref=e512] [cursor=pointer]: Collapse is a general process that is not restricted to any type of society or level of complexity.
        - paragraph [ref=e513] [cursor=pointer]: Complexity in human societies, as discussed in greater detail in Chapter 2, is not an all-or-nothing proposition.
        - paragraph [ref=e514] [cursor=pointer]: Societies vary in complexity along a continuous scale, and any society that increases or decreases in complexity does so along the progression of this scale.
        - paragraph [ref=e515] [cursor=pointer]: There is no point on such a scale at which complexity can be said to emerge.
        - paragraph [ref=e516] [cursor=pointer]: Hunting bands and tribal cultivators experience changes in complexity, either increases or decreases, just as surely as do large nations.
        - paragraph [ref=e517] [cursor=pointer]: Collapse, involving as it does a sudden, major loss of an established level of complexity, must be considered relative to the size of the society in which it occurs.
        - paragraph [ref=e518] [cursor=pointer]: Simple societies can lose an established level of complexity just as do great empires.
        - paragraph [ref=e519] [cursor=pointer]: Sedentary horticulturalists may become mobile foragers, and lose the sociopolitical trappings of village life.
        - paragraph [ref=e520] [cursor=pointer]: A region organized under central chiefly administration may lose this hierarchical umbrella and revert to independent, feuding villages.
        - paragraph [ref=e521] [cursor=pointer]: A group of foragers may be so distressed by environmental deterioration that sharing and societal organization are largely abandoned.
        - paragraph [ref=e522] [cursor=pointer]: These are cases of collapse, no less so than the end of Rome, and no less significant for their respective populations.
        - paragraph [ref=e523] [cursor=pointer]: To the extent, moreover, that the collapses of simpler societies can be understood by general principles, they are no less illuminating than the fall of nations and empires.
        - paragraph [ref=e524] [cursor=pointer]: Any explanation of collapse that purports to have general potential should help us to understand the full spectrum of its manifestations, from the simplest to the most complex.
        - paragraph [ref=e525] [cursor=pointer]: This, indeed, is one of the central points and goals of the work.
        - paragraph [ref=e526] [cursor=pointer]: These points made, it should be cautioned that in fact defining collapse is no easy matter.
        - paragraph [ref=e527] [cursor=pointer]: The present discussion may serve to introduce the orientation, but the definition will have to be added to as the work progresses.
        - paragraph [ref=e528] [cursor=pointer]: Collapse in history
        - paragraph [ref=e529] [cursor=pointer]: The fall of the Roman Empire is, in the West, the most widely known instance of collapse, the one which comes most readily to popular thought.
        - paragraph [ref=e530] [cursor=pointer]: Yet it is only one case, if a particularly dramatic one, of a fairly common process.
        - paragraph [ref=e531] [cursor=pointer]: Collapse is a recurrent feature of human societies, and indeed it is this fact that makes it worthwhile to explore a general explanation.
        - paragraph [ref=e532] [cursor=pointer]: The following pages give a brief overview of some cases of collapse.
        - paragraph [ref=e533] [cursor=pointer]: This overview is intended to illustrate common elements to the phenomenon, and also to portray the range of societies that are susceptible.
        - paragraph [ref=e534] [cursor=pointer]: In accord with the discussion of the previous section, the reader will find in the following pages a spectrum of societies from simple to powerful and complex.
        - paragraph [ref=e535] [cursor=pointer]: The discussion is arranged by major geographical areas, and then chronologically.
        - paragraph [ref=e536] [cursor=pointer]: The picture that emerges is of a process recurrent in history and prehistory, and global in its distribution.
        - paragraph [ref=e537] [cursor=pointer]: This is by no means a complete list.
        - paragraph [ref=e538] [cursor=pointer]: Further cases were no longer sought when it seemed that redundancy would result.
        - paragraph [ref=e539] [cursor=pointer]: There have been, in addition, no doubt many hundreds or thousands of collapses among centralized societies that were not organized at a sufficient level of complexity to produce written records.
        - paragraph [ref=e540] [cursor=pointer]: Some of these are known archaeologically, but probably only a small minority.
        - paragraph [ref=e541] [cursor=pointer]: To the extent that collapse is a general process, such cases are fully pertinent to understanding it, and should be studied whenever found.
        - paragraph [ref=e542] [cursor=pointer]: The Western Chou Empire
        - paragraph [ref=e543] [cursor=pointer]: The Chou dynasty succeeded the corrupt Shang in the mastery of China by 1122 B.C.
        - paragraph [ref=e544] [cursor=pointer]: A reign was subsequently established that later Chinese looked back on as a golden age.
        - paragraph [ref=e545] [cursor=pointer]: The Chou ruled through a feudal system, but within a few centuries their control began to slip.
        - paragraph [ref=e546] [cursor=pointer]: The royal house began to lose power as early as 934 B.C.
        - paragraph [ref=e547] [cursor=pointer]: Barbarian invasions increased in frequency through the ninth and eighth centuries, and regional lords began to ignore their obligations to the Chou court.
        - paragraph [ref=e548] [cursor=pointer]: In 771 B.C.
        - paragraph [ref=e549] [cursor=pointer]: the last Western Chou ruler was killed in battle and the capital city, Hao, overrun and sacked by northerners.
        - paragraph [ref=e550] [cursor=pointer]: Following this disaster, the Chou capital was moved east to Loyang, where the Eastern Chou dynasty resided from 770 to 256 B.C.
        - paragraph [ref=e551] [cursor=pointer]: "The Eastern Chou, however, were powerless figureheads: Chinese unity effectively collapsed with the Western Chou."
        - paragraph [ref=e552] [cursor=pointer]: Through the Spring and Autumn (770-464 B.C.)
        - paragraph [ref=e553] [cursor=pointer]: and Warring States (463-222 B.C.)
        - paragraph [ref=e554] [cursor=pointer]: periods, disintegration and endless conflict were the norms.
        - paragraph [ref=e555] [cursor=pointer]: Powerful regional states emerged which contended endlessly for hegemony, forging and breaking alliances, engaging in wars, and manipulating barbarian groups.
        - paragraph [ref=e556] [cursor=pointer]: Through time, as conflict intensified, smaller states were continuously absorbed.
        - paragraph [ref=e557] [cursor=pointer]: The contending states became fewer but larger, until finally the Ch'in reunified China in 221 B.C.
        - paragraph [ref=e558] [cursor=pointer]: The period of disintegration and conflict produced some of China's major philosophical, literary, and scientific achievements.
        - paragraph [ref=e559] [cursor=pointer]: Confucius wrote during, and in reaction to, this era.
        - paragraph [ref=e560] [cursor=pointer]: Contending schools of philosophy (the 'Hundred Schools') proliferated and flourished between 500 and 250 B.C.
        - paragraph [ref=e561] [cursor=pointer]: In addition to many technical and economic developments, Chinese political thought in its classical form emerged during the worst of the breakdown (Creel 1953, 1970; Needham 1965; Levenson and Schurman 1969; Hucker 1975).
        - paragraph [ref=e562] [cursor=pointer]: The Harappan Civilization
        - paragraph [ref=e563] [cursor=pointer]: The Harappan, or Indus Valley, Civilization existed in northwestern India perhaps as early as 2400 B.C.
        - paragraph [ref=e564] [cursor=pointer]: It was apparently dominated by two major cities, Mohenjo-Daro in the central Indus Valley, and Harappa upstream.
        - paragraph [ref=e565] [cursor=pointer]: "Both were established according to similar designs: a fortified citadel on the western side, with civic and religious buildings, and a lower urban zone, with gridded, standardized streets, and systems of drainage and refuse disposal."
        - paragraph [ref=e566] [cursor=pointer]: There were many smaller centers, some with the same basic layout.
        - paragraph [ref=e567] [cursor=pointer]: Seaports controlled the coastline above and below the Indus.
        - paragraph [ref=e568] [cursor=pointer]: This literate civilization shows a striking degree of uniformity through time and space in pottery, ornaments, bricks, weapons, implements of bronze and stone, seals, and civic planning.
        - paragraph [ref=e569] [cursor=pointer]: Both major sites had massive granaries.
        - paragraph [ref=e570] [cursor=pointer]: The impression is of a highly centralized society in which the state controlled many facets of daily living - milling grain, manufacturing bricks and mass producing pottery, obtaining firewood, and building residences.
        - paragraph [ref=e571] [cursor=pointer]: Yet by roughly 1750 B.C.
        - paragraph [ref=e572] [cursor=pointer]: this regional uniformity and centralized control had broken down.
        - paragraph [ref=e573] [cursor=pointer]: In urban centers the standardization of street frontages declined, brickwork was less careful, bricks from older buildings were reused in new, expedient ones, and older buildings were subdivided.
        - paragraph [ref=e574] [cursor=pointer]: Pottery kilns came for the first time to be built within city walls.
        - paragraph [ref=e575] [cursor=pointer]: Expressive art became simpler.
        - paragraph [ref=e576] [cursor=pointer]: Hoards of jewelry were stashed away.
        - paragraph [ref=e577] [cursor=pointer]: Groups of unburied corpses were left lying in the streets.
        - paragraph [ref=e578] [cursor=pointer]: At some centers, the Harappan occupation was followed by people who lived among the ruins in flimsy huts, seemingly after the complete breakdown of civil authority.
        - paragraph [ref=e579] [cursor=pointer]: Eventually these, too, passed into history (Piggott 1950; Raikes 1964; Dales 1966; Thapar 1966; Wheeler 1966, 1968; Allchin and Allchin 1968; Gupta 1982).
        - paragraph [ref=e580] [cursor=pointer]: Mesopotamia
        - paragraph [ref=e581] [cursor=pointer]: Mesopotamia is characteristically seen as the heartland, the center of origin of civilization and urban society.
        - paragraph [ref=e582] [cursor=pointer]: It displays a history of political rises and declines that furnishes many examples of collapse.
        - paragraph [ref=e583] [cursor=pointer]: From the competing city-states of the early third millennium B.C., Sargon of Akkad developed the first Mesopotamian empire (ca.
        - paragraph [ref=e584] [cursor=pointer]: 2350-2150 B.C.).
        - paragraph [ref=e585] [cursor=pointer]: Its fall some 200 years following establishment was presaged by a series of rebellions in the subject city-states.
        - paragraph [ref=e586] [cursor=pointer]: A period of decentralization followed in southern Mesopotamia.
        - paragraph [ref=e587] [cursor=pointer]: The next period of regional hegemony was established by the Third Dynasty of Ur (ca.
        - paragraph [ref=e588] [cursor=pointer]: 2100-2000 B.C.), which set up a vast regional bureaucracy to collect taxes and tribute.
        - paragraph [ref=e589] [cursor=pointer]: The Third Dynasty of Ur encouraged expansion of the irrigation system, and growth of population and settlement.
        - paragraph [ref=e590] [cursor=pointer]: This attempt to maximize economic and political power led to a rapid collapse, with disastrous consequences for southern Mesopotamia.
        - paragraph [ref=e591] [cursor=pointer]: Over the next millennium or so there was a 40 percent reduction in the number of settlements, and a 77 percent reduction in settled area.
        - paragraph [ref=e592] [cursor=pointer]: Political power shifted to the north, to Babylon.
        - paragraph [ref=e593] [cursor=pointer]: The empire established by Hammurabi (ca.
        - paragraph [ref=e594] [cursor=pointer]: 1792-1750 B.C.)
        - paragraph [ref=e595] [cursor=pointer]: did not survive the death of his son, Samsuiluna (died ca.
        - paragraph [ref=e596] [cursor=pointer]: 1712 B.C.).
        - paragraph [ref=e597] [cursor=pointer]: Four succeeding kings ruled a greatly reduced realm, until the dynasty was terminated by the Hittites.
        - paragraph [ref=e598] [cursor=pointer]: Partly coterminously, the Assyrians in the period between 1920 and 1780 B.C.
        - paragraph [ref=e599] [cursor=pointer]: established widespread trade routes, and then collapsed.
        - paragraph [ref=e600] [cursor=pointer]: The Assyrians enjoyed a political resurgence in the 14th century B.C., and then again from the ninth to the seventh centuries.
        - paragraph [ref=e601] [cursor=pointer]: In this latter era they held a vast empire over much of the Near East, only to lose most of these dependencies and suffer defeat by the Medes in 614 B.C.
        - paragraph [ref=e602] [cursor=pointer]: Assyrian social and political institutions disappeared thereafter.
        - paragraph [ref=e603] [cursor=pointer]: After a brief resurgence by Babylon, brought to an end by Cyrus the Great, Mesopotamia was incorporated into successive Near Eastern empires of varying size and durability - Achaemenian, Seleucid, Parthian, Sassanian, and Islamic.
        - paragraph [ref=e604] [cursor=pointer]: There was an irregular but largely sustained increase in the scale and complexity of the agricultural regime, in population density, and in city building.
        - paragraph [ref=e605] [cursor=pointer]: Sometime in the seventh through tenth centuries A.D., however, there was a major collapse in the Mesopotamian alluvium.
        - paragraph [ref=e606] [cursor=pointer]: By the eleventh or twelfth centuries A.D.
        - paragraph [ref=e607] [cursor=pointer]: the total occupied area had shrunk to only about six percent of its level 500 years earlier.
        - paragraph [ref=e608] [cursor=pointer]: Population dropped to the lowest point in five millennia.
