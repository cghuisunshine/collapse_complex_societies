        - paragraph [ref=e957] [cursor=pointer]: The Kachin
        - paragraph [ref=e958] [cursor=pointer]: The Kachin of Highland Burma are a classic people of anthropology.
        - paragraph [ref=e959] [cursor=pointer]: They are organized into three contrasting forms of society.
        - paragraph [ref=e960] [cursor=pointer]: These are the gumlao, or egalitarian, the gumsa, or stratified, and the shan, or feudal.
        - paragraph [ref=e961] [cursor=pointer]: Sociopolitical complexity and level of hierarchical authority increase through these social forms, in the order listed.
        - paragraph [ref=e962] [cursor=pointer]: The noteworthy fact about the Kachin is that these forms are not static.
        - paragraph [ref=e963] [cursor=pointer]: Local groups may oscillate between gumlao and shan-like characteristics.
        - paragraph [ref=e964] [cursor=pointer]: Gumsa organization is a compromise between these contrasting poles.
        - paragraph [ref=e965] [cursor=pointer]: Some gumsa become shan, others revert back to gumlao organization.
        - paragraph [ref=e966] [cursor=pointer]: Yet equality of descent groups cannot be maintained, and eventually gumsa societies emerge from gumlao.
        - paragraph [ref=e967] [cursor=pointer]: What is most pertinent to the present topic is that stratified gumsa societies do not remain so.
        - paragraph [ref=e968] [cursor=pointer]: Through disaffection of their members, principles of hierarchy and associated complexity are periodically lost as such societies collapse to egalitarian organization (Leach 1954).
        - paragraph [ref=e969] [cursor=pointer]: The Ik
        - paragraph [ref=e970] [cursor=pointer]: The Ik are a people of northern Uganda who live at what must surely be the extreme of deprivation and disaster.
        - paragraph [ref=e971] [cursor=pointer]: A largely hunting and gathering people who have in recent times practiced some crop planting, the Ik are not classifiable as a complex society in the sense of Chapter 2.
        - paragraph [ref=e972] [cursor=pointer]: They are, nonetheless, a morbidly fascinating case of collapse in which a former, low level of social complexity has essentially disappeared.
        - paragraph [ref=e973] [cursor=pointer]: Due to drought and disruption by national boundaries of the traditional cycle of movement, the Ik live in such a food- and water-scarce environment that there is absolutely no advantage to reciprocity and social sharing.
        - paragraph [ref=e974] [cursor=pointer]: The Ik, in consequence, display almost nothing of what could be considered societal organization.
        - paragraph [ref=e975] [cursor=pointer]: They are so highly fragmented that most activities, especially subsistence, are pursued individually.
        - paragraph [ref=e976] [cursor=pointer]: Each Ik will spend days or weeks on his or her own, searching for food and water.
        - paragraph [ref=e977] [cursor=pointer]: Sharing is virtually nonexistent.
        - paragraph [ref=e978] [cursor=pointer]: Two siblings or other kin can live side-by-side, one dying of starvation and the other well nourished, without the latter giving the slightest assistance to the other.
        - paragraph [ref=e979] [cursor=pointer]: The family as a social unit has become dysfunctional.
        - paragraph [ref=e980] [cursor=pointer]: Even conjugal pairs don't form a cooperative unit except for a few specific purposes.
        - paragraph [ref=e981] [cursor=pointer]: Their motivation for marriage or cohabitation is that one person can't build a house alone.
        - paragraph [ref=e982] [cursor=pointer]: The members of a conjugal pair forage alone, and do not share food.
        - paragraph [ref=e983] [cursor=pointer]: Indeed, their foraging is so independent that if both members happen to be at their residence together it is by accident.
        - paragraph [ref=e984] [cursor=pointer]: Each conjugal compound is stockaded against the others.
        - paragraph [ref=e985] [cursor=pointer]: Several compounds together form a village, but this is a largely meaningless occurrence.
        - paragraph [ref=e986] [cursor=pointer]: Villages have no political functions or organization, not even a central meeting place.
        - paragraph [ref=e987] [cursor=pointer]: Children are minimally cared for by their mothers until age three, and then are put out to fend for themselves.
        - paragraph [ref=e988] [cursor=pointer]: This separation is absolute.
        - paragraph [ref=e989] [cursor=pointer]: By age three they are expected to find their own food and shelter, and those that survive do provide for themselves.
        - paragraph [ref=e990] [cursor=pointer]: Children band into age-sets for protection, since adults will steal a child's food whenever possible.
        - paragraph [ref=e991] [cursor=pointer]: No food sharing occurs within an age-set.
        - paragraph [ref=e992] [cursor=pointer]: Groups of children will forage in agricultural fields, which scares off birds and baboons.
