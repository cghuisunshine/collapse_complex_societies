        - paragraph [ref=e926] [cursor=pointer]: saw the development in Peru of extensive irrigation and agricultural terracing in conjunction with growth of population.
        - paragraph [ref=e927] [cursor=pointer]: True cities were built that were the capitals of regional states.
        - paragraph [ref=e928] [cursor=pointer]: These shared a common heritage of technology and ideology, but were divided by distinctive art styles, separate governments, and competition for food and land.
        - paragraph [ref=e929] [cursor=pointer]: Out of this competitive situation two empires emerged, those of Huari in the north and Tiahuanaco in the south.
        - paragraph [ref=e930] [cursor=pointer]: At its height the Huari Empire dominated almost the entire central Andes and much of the adjacent coastal lowlands.
        - paragraph [ref=e931] [cursor=pointer]: This empire was controlled by the highland city of Huari.
        - paragraph [ref=e932] [cursor=pointer]: In a short time, Huari-derived ceramic styles (themselves influenced by Tiahuanaco wares) appeared in many regions.
        - paragraph [ref=e933] [cursor=pointer]: "Early Huari ceramics (like the later Inca wares) tend to occur in politico-religious contexts: in ceremonial centers, in cities, and in other high-prestige sites."
        - paragraph [ref=e934] [cursor=pointer]: Molds were used for the mass production of pottery.
        - paragraph [ref=e935] [cursor=pointer]: As these wares spread, local styles began to lose importance.
        - paragraph [ref=e936] [cursor=pointer]: The Huari Empire imposed economic, social, and cultural changes on the areas it dominated.
        - paragraph [ref=e937] [cursor=pointer]: Local cultures were disrupted.
        - paragraph [ref=e938] [cursor=pointer]: Major urban centers were established in each valley.
        - paragraph [ref=e939] [cursor=pointer]: Building complexes in the Huari architectural style (administrative structures, storehouses, or barracks) were constructed at various places.
        - paragraph [ref=e940] [cursor=pointer]: Cities rose and fell with the Huari Empire.
        - paragraph [ref=e941] [cursor=pointer]: Goods and information were exchanged across the central Andes on a scale never seen before.
        - paragraph [ref=e942] [cursor=pointer]: Various authors have suggested that urbanism and militarism, state distribution of foodstuffs, the Andean road system, and the spread of the Quechua language began with the Huari Empire.
        - paragraph [ref=e943] [cursor=pointer]: Until recently, the case for a contemporaneous, or chronologically overlapping, Tiahuanaco Empire was less clear.
        - paragraph [ref=e944] [cursor=pointer]: Since the only detailed work had been at the city of Tiahuanaco itself, in the Lake Titicaca Basin, the argument for an empire was by comparison to Huari.
        - paragraph [ref=e945] [cursor=pointer]: Recent work, however, has shown that a large rural hinterland was transformed by the Tiahuanaco rulers into an artificial agricultural landscape.
        - paragraph [ref=e946] [cursor=pointer]: There were massive public reclamation and construction projects that required large, coordinated labor forces.
        - paragraph [ref=e947] [cursor=pointer]: Throughout the Lake Titicaca Basin state administrative structures were built near potentially arable land.
        - paragraph [ref=e948] [cursor=pointer]: The settlement pattern suggests political unification of the Basin, and the existence of an empire.
        - paragraph [ref=e949] [cursor=pointer]: Tiahuanaco itself may have held between 20,000 and 40,000 persons.
        - paragraph [ref=e950] [cursor=pointer]: In both cases there was a major collapse by ca.
