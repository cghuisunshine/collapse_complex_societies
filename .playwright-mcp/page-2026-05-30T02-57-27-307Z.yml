        - paragraph [ref=e1036] [cursor=pointer]: "Based on the sketches of the preceding pages, and an excellent summary by Colin Renfrew (1979: 482-5), the characteristics of societies after collapse may be summarized as follows."
        - paragraph [ref=e1037] [cursor=pointer]: There is, first and foremost, a breakdown of authority and central control.
        - paragraph [ref=e1038] [cursor=pointer]: Prior to collapse, revolts and provincial breakaways signal the weakening of the center.
        - paragraph [ref=e1039] [cursor=pointer]: Revenues to the government often decline.
